name: DevBrain CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # Job 1: Scan for committed secrets and API keys using Gitleaks
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for accurate commit scans

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Build & Verify Application
  build-and-verify:
    name: Build & Verify
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: TypeScript Typecheck
        run: npx tsc --noEmit

      - name: Run Tests
        env:
          # Pass dummy variables to satisfy Zod validation in test phase
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
          DATABASE_URL_UNPOOLED: "postgresql://postgres:postgres@localhost:5432/postgres"
          UPSTASH_REDIS_REST_URL: "https://localhost:6379"
          UPSTASH_REDIS_REST_TOKEN: "dummy_token"
          NVIDIA_API_KEY: "dummy_nim_key"
          NVIDIA_BASE_URL: "https://integrate.api.nvidia.com/v1"
          NVIDIA_EMBEDDING_API_KEY: "dummy_embedding_key"
          NVIDIA_RERANKING_API_KEY: "dummy_rerank_key"
          BETTER_AUTH_SECRET: "dummy_secret_auth"
          NEXTAUTH_SECRET: "dummy_secret_auth"
          NEXTAUTH_URL: "http://localhost:3000"
          SENTRY_DSN: "https://dummy_sentry@ingest.sentry.io/12345"
        run: npm run test
